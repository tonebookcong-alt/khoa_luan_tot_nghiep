version: '3.9'

services:
  # ==================== DATABASES ====================
  postgres:
    image: postgres:16-alpine
    container_name: phonemarket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phonemarket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phonemarket123}
      POSTGRES_DB: ${POSTGRES_DB:-phonemarket}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-phonemarket}']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: phonemarket_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-phonemarket}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-phonemarket123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-phonemarket_ai}
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: phonemarket_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-phonemarket123}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-phonemarket123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== SERVICES ====================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: phonemarket_backend
    restart: unless-stopped
    env_file: ../.env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/uploads:/app/uploads

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: phonemarket_ai_service
    restart: unless-stopped
    env_file: ../.env
    ports:
      - '3002:3002'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: phonemarket_frontend
    restart: unless-stopped
    env_file: ../.env
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
